<div class="recipe-section">
    <div class="container">

        <div class="row g-4 d-flex justify-content-center">
            <div class="col-12">
                <div class="recipe-card">
                    <div class="card-image">
                        <img [src]="selectedRecipe().imageUrl" [alt]="selectedRecipe().name">
                    </div>

                    <div class="card-content">
                        <div class="card-header-row">
                            <h2 class="recipe-name">{{ selectedRecipe().name }}</h2>
                        </div>

                        <ul class="ingredient-list">
                            @for (ing of selectedRecipe().ingredients; track ing.name) {
                            <li>
                                {{ ing.name }}: <span class="amount">{{ ing.amount }} {{ing.unit}}</span>
                            </li>
                            } @empty {
                            <li>Nincsenek hozzávalók.</li>
                            }
                        </ul>
                        <div>
                            <p>
                                {{selectedRecipe().description}}
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="row mt-4">
            <div class="col-12 d-flex justify-content-center">
                <div class="add-recipe-btn shadow-sm" (click)="backToHome()">
                    Vissza a főoldalra
                </div>
            </div>
        </div>
        <div class="row mt-4">
            <div class="col-12 d-flex justify-content-center">
                <div class="add-recipe-btn shadow-sm" (click)="makeSelectedRecipe()">
                    Megettem
                </div>
            </div>
        </div>
    </div>
</div>
