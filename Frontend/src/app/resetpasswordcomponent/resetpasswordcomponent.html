<div class="login-page">
  <div class="login-card">
    
    <header class="logo-section">
      <img src="assets/logo.png" alt="Recept+ Logo" class="main-logo">
      <h1 class="brand-name">Recept +</h1>
      <span class="page-subtitle">ÚJ JELSZÓ MEGADÁSA</span>
    </header>

    <div class="login-body">
      <p class="info-text">
        Biztonságos kapcsolat aktív. Kérjük, adjon meg egy új jelszót (minimum 6 karakter).
      </p>
      
      <div class="input-wrapper enhanced">
        <i class="bi bi-shield-lock input-icon"></i>
        <input 
          [type]="showPassword ? 'text' : 'password'" 
          [(ngModel)]="newPassword" 
          placeholder="Új jelszó megadása..."
          class="form-control"
        >
        <i class="bi password-toggle" 
           [class.bi-eye]="!showPassword" 
           [class.bi-eye-slash]="showPassword" 
           (click)="showPassword = !showPassword"></i>
      </div>

      <div class="input-wrapper enhanced confirm-space">
        <i class="bi bi-check2-circle input-icon"></i>
        <input 
          [type]="showPassword ? 'text' : 'password'" 
          [(ngModel)]="confirmPassword" 
          placeholder="Jelszó megerősítése..."
          class="form-control"
        >
      </div>

      <button class="submit-btn-final" 
              (click)="confirmReset()" 
              [disabled]="newPassword.length < 6 || newPassword !== confirmPassword">
        <span>Jelszó mentése</span>
        <i class="bi bi-check-circle ms-2"></i>
      </button>
    </div>

    <div class="form-footer">
      <p>Mégsem módosítanál?</p>
      <button type="button" routerLink="/login" class="footer-link">Vissza a belépéshez</button>
    </div>

  </div>
</div>
