<div class="container-fluid">
  <div class="row">

    @if (
    !router.url.startsWith('/login') &&
    !router.url.startsWith('/register') &&
    !router.url.startsWith('/reset-password')) {

    <div class="col-12">
      <app-navbar></app-navbar>
    </div>

    <div class="col-12 mt-6">
      <app-searchbar></app-searchbar>
    </div>
    }

    <div class="col-12">
      <router-outlet></router-outlet>
      <app-toastwindowcomponent></app-toastwindowcomponent>
    </div>

    @if (!router.url.startsWith('/login') &&
    !router.url.startsWith('/register') &&
    !router.url.startsWith('/reset-password')) {

    <div class="col-12" #footerRef>
      <app-footer></app-footer>
    </div>
    }

  </div>

  <button 
    class="scroll-to-top" 
    [class.visible]="showScrollButton"
    [style.bottom.px]="scrollBottom"
    (click)="scrollToTop()">
    <i class="bi bi-chevron-up"></i>
  </button>
</div>
